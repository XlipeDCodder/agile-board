# =============================================================================
# Stack do agile-board (sistema interno B-Agile).
#
# Topologia: nginx termina SSL na 8443 e faz reverse proxy pros containers
# internos (app:8000 e reverb:8080). Postgres e Redis expostos em portas
# alternativas pra coexistir com outro Laravel já no host.
#
# Portas externas:
#   - HTTPS:    8443  (nginx — proxy pra app/reverb)
#   - Postgres: 5433  (interno 5432)
#   - Redis:    6380  (interno 6379)
#
# URL de acesso: https://agileboard.salvador.ba.gov.br:8443
# Sem mapear a 80 porque outro Laravel já a usa no host. Sem redirect
# HTTP→HTTPS por isso — usuários acessam direto a URL com :8443.
#
# Pré-requisitos no servidor:
#   - Cert SSL em ./docker/certs/agileboard.crt + agileboard.key
#     (gerado via mkcert na máquina dev — ver docs)
#   - .env configurado (ver instruções de deploy)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Nginx — termina SSL e faz reverse proxy pros containers internos.
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: agile-board-nginx
    restart: unless-stopped
    ports:
      # 8443 externa → 443 interna do nginx (SSL termination).
      # Se quiser usar 443 padrão (URL sem porta), troque pra "443:443"
      # mas só se o outro Laravel não estiver ocupando.
      - "8443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      - app
      - reverb
    networks:
      - agile-board

  # ---------------------------------------------------------------------------
  # Aplicação Laravel (HTTP via php artisan serve com 4 workers).
  # SEM portas expostas — fica acessível só pra nginx pela rede interna.
  # ---------------------------------------------------------------------------
  app:
    # &app_build é um YAML anchor: reverb e queue reusam o mesmo build via
    # *app_build. Compose só builda 1 vez (cache do Docker cuida dos repeats)
    # e os 3 containers compartilham a imagem.
    build: &app_build
      context: .
      args:
        # Vite resolve essas vars em build-time e as embute no JS final.
        # Pra mudar o host/porta que o NAVEGADOR usa pra falar com o Reverb,
        # precisa rebuildar (docker compose build app).
        VITE_REVERB_APP_KEY: ${REVERB_APP_KEY}
        VITE_REVERB_HOST: ${VITE_REVERB_HOST}
        VITE_REVERB_PORT: ${VITE_REVERB_PORT}
        VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-https}
    image: agile-board-app:latest
    container_name: agile-board-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      # .env como volume read-WRITE pra que comandos como artisan key:generate
      # e migrate possam escrever quando precisarem. O servidor é privado
      # (apenas admins têm acesso shell), então o risco do app modificar o
      # próprio config é aceitável.
      - ./.env:/var/www/html/.env
      # storage persistente: uploads de anexos, logs, sessões.
      - agile-board-storage:/var/www/html/storage
    networks:
      - agile-board

  # ---------------------------------------------------------------------------
  # Servidor Reverb (WebSocket). Nginx faz proxy de /app|/apps pra cá.
  # ---------------------------------------------------------------------------
  reverb:
    build: *app_build
    image: agile-board-app:latest
    container_name: agile-board-reverb
    restart: unless-stopped
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    env_file:
      - .env
    depends_on:
      - app
      - redis
    volumes:
      - ./.env:/var/www/html/.env
      - agile-board-storage:/var/www/html/storage
    networks:
      - agile-board

  # ---------------------------------------------------------------------------
  # Worker de fila (broadcast events, jobs)
  # ---------------------------------------------------------------------------
  queue:
    build: *app_build
    image: agile-board-app:latest
    container_name: agile-board-queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--tries=3", "--max-time=3600", "--sleep=3"]
    env_file:
      - .env
    depends_on:
      - app
      - redis
      - postgres
    volumes:
      - ./.env:/var/www/html/.env
      - agile-board-storage:/var/www/html/storage
    networks:
      - agile-board

  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: agile-board-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - agile-board-pgdata:/var/lib/postgresql/data
    networks:
      - agile-board
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis (cache + queue + session)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: agile-board-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - agile-board-redis:/data
    networks:
      - agile-board

volumes:
  agile-board-pgdata:
  agile-board-redis:
  agile-board-storage:

# Rede isolada pra esse stack — não interfere com o outro Laravel
# que já roda no mesmo host.
networks:
  agile-board:
    name: agile-board-net
    driver: bridge
