# =============================================================================
# Reverse proxy do agile-board:
#   - Termina SSL na 443 com cert auto-assinado (mkcert)
#   - Proxy / → app:8000 (Laravel via php artisan serve)
#   - Proxy /app, /apps → reverb:8080 (WebSocket)
#   - Redirect 80 → 443
# =============================================================================

worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    server_tokens   off;

    # Upload de anexos pode passar do default de 1M.
    client_max_body_size 32M;

    # HTTPS principal (porta 443 interna, mapeada pra 8443 externa pelo compose
    # — a porta 80 do host está ocupada por outro serviço, sem redirect HTTP).
    server {
        listen 443 ssl;
        http2 on;
        server_name agileboard.salvador.ba.gov.br _;

        ssl_certificate     /etc/nginx/certs/agileboard.crt;
        ssl_certificate_key /etc/nginx/certs/agileboard.key;

        # TLS 1.2+ apenas.
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Headers úteis pro Laravel reconhecer o esquema correto.
        # X-Forwarded-Port=8443 é o que diz pro Laravel "a URL pública
        # tem :8443 no fim" — sem isso, ele gera URLs sem porta nem com
        # https, daí o navegador bloqueia assets por mixed content.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  8443;

        # Reverb (WebSocket) — caminhos /app e /apps são default do Reverb.
        location ~ ^/(app|apps)/ {
            proxy_pass http://reverb:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "Upgrade";
            # Conexão WebSocket pode ficar aberta o dia inteiro.
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
        }

        # Aplicação Laravel.
        location / {
            proxy_pass http://app:8000;
            proxy_http_version 1.1;
            proxy_read_timeout 90s;
        }
    }
}
